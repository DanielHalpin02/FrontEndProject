<ion-header>
  <ion-toolbar>
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Progress Summary</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p>
        <strong>Latest Weight:</strong>
        {{ latestWeight !== null ? (latestWeight + ' kg') : 'No entries yet' }}
      </p>

      <p>
        <strong>Total Entries:</strong>
        {{ totalEntries }}
      </p>

      <p>
        <strong>Average Weight:</strong>
        {{ averageWeight !== null ? (averageWeight | number:'1.1-1') + ' kg' : 'No entries yet' }}
      </p>
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" routerLink="/weight-log">
    Go to Weight Log
  </ion-button>
</ion-content>
