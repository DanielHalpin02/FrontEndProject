<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Weight Log</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="page-intro">
    <h2>Track Your Weight</h2>
    <p>Add entries and monitor your progress over time.</p>
  </div>

  <ion-card class="form-card">
    <ion-card-header>
      <ion-card-title>Add Weight Entry</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label position="stacked">Date</ion-label>
        <ion-datetime presentation="date" [(ngModel)]="formData.date"></ion-datetime>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Weight (kg)</ion-label>
        <ion-input type="number" [(ngModel)]="formData.weight"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Note</ion-label>
        <ion-textarea [(ngModel)]="formData.note"></ion-textarea>
      </ion-item>

      <ion-button expand="block" class="ion-margin-top" (click)="addEntry()">
        Save Entry
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-card class="entries-card">
    <ion-card-header>
      <ion-card-title>Saved Entries</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-list *ngIf="weightEntries.length > 0; else emptyState">
        <ion-item *ngFor="let entry of weightEntries">
          <ion-label>
            <h2>{{ entry.weight }} kg</h2>
            <p>{{ entry.date | date:'mediumDate' }}</p>
            <p>{{ entry.note || 'No note added' }}</p>
          </ion-label>

          <ion-button fill="outline" color="danger" (click)="deleteEntry(entry.id)">
            Delete
          </ion-button>
        </ion-item>
      </ion-list>

      <ng-template #emptyState>
        <p class="empty-message">No weight entries yet.</p>
      </ng-template>
    </ion-card-content>
  </ion-card>
</ion-content>
