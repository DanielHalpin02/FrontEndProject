<ion-header>
  <ion-toolbar>
    <ion-title>Workouts</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <ion-card *ngFor="let workout of workouts | slice:0:20" [routerLink]="['/workouts', workout.id]">
    <ion-card-header>
      <ion-card-title>{{ workout.name }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p><strong>Category:</strong> {{ workout.category }}</p>
      <p><strong>Level:</strong> {{ workout.level }}</p>
      <p><strong>Equipment:</strong> {{ workout.equipment || 'Not specified' }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
