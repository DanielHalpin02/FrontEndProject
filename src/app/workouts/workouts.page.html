<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Workouts</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar
    placeholder="Search workouts by name"
    (ionInput)="onSearchChange($event)">
  </ion-searchbar>

  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <p *ngIf="!errorMessage && filteredWorkouts.length === 0">
    No workouts found.
  </p>

  <ion-card *ngFor="let workout of filteredWorkouts | slice:0:20" [routerLink]="['/workouts', workout.id]">
    <ion-card-header>
      <ion-card-title>{{ workout.name }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p><strong>Category:</strong> {{ workout.category }}</p>
      <p><strong>Level:</strong> {{ workout.level }}</p>
      <p><strong>Equipment:</strong> {{ workout.equipment || 'Not specified' }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
