<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/workouts"></ion-back-button>
    </ion-buttons>
    <ion-title>Workout Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

  <ion-card *ngIf="workout" class="details-card">
    <ion-card-header>
      <ion-card-title>{{ workout.name }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <div class="detail-row">
        <span>Category</span>
        <strong>{{ workout.category }}</strong>
      </div>

      <div class="detail-row">
        <span>Level</span>
        <strong>{{ workout.level }}</strong>
      </div>

      <div class="detail-row">
        <span>Equipment</span>
        <strong>{{ workout.equipment || 'Not specified' }}</strong>
      </div>

      <div class="description-box">
        <h3>Description</h3>
        <p>{{ description }}</p>
      </div>
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" routerLink="/workouts">
    Back to Workouts
  </ion-button>
</ion-content>
